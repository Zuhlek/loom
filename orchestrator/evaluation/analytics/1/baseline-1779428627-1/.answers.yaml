# Canned answer queue for the bookmarks baseline seed.
# Consumed in order by the Spec grilling agent. The eval harness
# (run-baseline.sh) stages this file as `.loom/<project>/.answers.yaml`
# before invoking /weave; each entry pre-answers one Q<n> the agent
# would otherwise surface via AskUserQuestion.
#
# These answers favour the minimal-surface direction from the seed:
# flat list, reject duplicates, no search, immutable bookmarks,
# newest-first only.
answers:
  - answer: "(A)"
  - answer: "(A)"
  - answer: "(A)"
