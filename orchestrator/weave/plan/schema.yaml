type: object
required: [phase, status, artifacts, summary, open-ambiguity]
properties:
  phase:
    enum: [plan]
  status:
    enum: [Pending, blocked, failed, complete]
  artifacts:
    type: array
    items:
      type: string
  summary:
    type: string
  open-ambiguity:
    type: array
    items:
      type: object
      required: [question, category]
      properties:
        question:
          type: string
        category:
          enum: [Y/N, Choice, Architecture, Background, Open]
  total-tasks:
    type: integer
  afk-count:
    type: integer
  hitl-count:
    type: integer
