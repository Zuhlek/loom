type: object
required: [phase, checked-phase, status, summary, recommendation, findings, artifacts]
properties:
  phase:
    enum: [quality-check]
  checked-phase:
    enum: [idea, design, plan, build, review]
  status:
    enum: [passed, findings]
  summary:
    type: string
  recommendation:
    enum: [continue, rerun]
  findings:
    type: array
    items:
      type: object
      required: [severity, title]
      properties:
        severity:
          enum: [blocker, major, minor, note]
        title:
          type: string
        suggested-focus:
          type: string
  artifacts:
    type: array
    items:
      type: string
